services:
  nuts-node:
    image: nutsfoundation/nuts-node:latest
    user: root
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - nuts-data:/nuts/data
      - ./config:/nuts/config:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  nuts-data:
